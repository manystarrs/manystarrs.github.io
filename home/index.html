<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            /* Background image */
            background-image: url('../background.jpg'); /* Adjusted path */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Fix the background position */
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            height: 100vh; /* Set height to viewport height */
            position: relative; /* Position relative for absolute positioning of sidebar */
        }
        .sidebar {
            height: 100%;
            width: 200px;
            position: absolute; /* Position sidebar relative to body */
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
            display: flex;
            justify-content: center; /* Center horizontally */
            align-items: center; /* Center vertically */
            flex-direction: column; /* Stack content vertically */
        }
        .sidebar a {
            display: block;
            padding: 10px 0;
            color: white;
            text-decoration: none;
        }
        .content {
            text-align: center; /* Center text horizontally */
            color: white;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <a href="index.html">Home</a>
        <a href="../about/about.html">About</a>
        <a href="../services/services.html">Services</a>
        <a href="../contact/contact.html">Contact</a>
        <a href="../tos/tos.html">Terms of Service</a>
    </div>
    <div class="content">
        <h1>Welcome to the Home Page</h1>
        <p>This is the home page of our website. Feel free to explore!</p>
    </div>
</body>
</html>
